# --- 既存の設定 ---
# Bluetoothの表示名を指定
CONFIG_ZMK_KEYBOARD_NAME="kg10key"

# 接続の安定性を高める（電波出力を強化）
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# USBとBluetoothの有効化
CONFIG_ZMK_BLE=y
CONFIG_ZMK_USB=y

# 省電力設定
CONFIG_ZMK_SLEEP=y

# --- 【修正・追記】ロータリーエンコーダーを動かすための設定 ---
# エンコーダーのドライバ機能を有効にします
CONFIG_EC11=y
# エンコーダーの信号処理をシステム全体の専用スレッドで行い、安定させます
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
