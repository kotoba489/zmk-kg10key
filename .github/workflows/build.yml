name: Build

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Cache west modules
        uses: actions/cache@v3
        env:
          cache-name: cache-zephyr-modules
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
            zmk/
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('config/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-
      - name: West Init
        run: west init -l config
      - name: West Update
        run: west update
      - name: West Zephyr export
        run: west zephyr-export
      - name: West Build (kgrid40)
        run: west build -s zmk/app -b nice_nano_v2 -- -DSHIELD=kgrid40 -DZMK_CONFIG="${GITHUB_WORKSPACE}/config"
      - name: Kgrid40 DTS File
        if: always()
        run: test -f build/zephyr/zmk.dts && cp build/zephyr/zmk.dts kgrid40.dts || true
      - name: Kgrid40 Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: 'kgrid40_nice_nano_v2'
          path: |
            build/zephyr/zmk.uf2
            kgrid40.dts
